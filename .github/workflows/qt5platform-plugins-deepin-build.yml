name: Build qt5platform-plugins on Deepin crimson

on:
  push:

  pull_request:

jobs:
  container:
    runs-on: ubuntu-latest
    container: linuxdeepin/deepin:crimson
    steps:
      - uses: actions/checkout@v4

      - name: Setup apt sources and build tools
        run: |
          set -euxo pipefail
          echo "deb [trusted=yes] http://mirrors.kernel.org/deepin/beige/ crimson main commercial community" > /etc/apt/sources.list
          echo "deb-src [trusted=yes] http://mirrors.kernel.org/deepin/beige/ crimson main commercial community" >> /etc/apt/sources.list
          rm -rf /etc/apt/sources.list.d
          apt-get update
          apt-get install -y devscripts equivs git

      - name: Build and install dtkcommon from source
        run: |
          set -euxo pipefail
          cd /tmp
          git clone --depth=1 https://github.com/linuxdeepin/dtkcommon.git
          cd dtkcommon
          mk-build-deps --install --remove --tool='apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes' debian/control
          dpkg-buildpackage -uc -us -b
          dpkg -i ../*.deb 2>/dev/null || apt-get install -f -y
          echo "✅ dtkcommon installed"

      - name: Install qt5platform-plugins build dependencies
        run: |
          set -euxo pipefail
          mk-build-deps --install --remove --tool='apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes' debian/control

      - name: Show environment info
        run: |
          echo "=== Qt5 version ===" && (dpkg -l qtbase5-dev 2>/dev/null | tail -1 || echo "Qt5 dev not found") || true
          echo "=== Qt6 version ===" && (dpkg -l qt6-base-dev 2>/dev/null | tail -1 || echo "Qt6 dev not found") || true
          echo "=== libqt5xcbqpa-dev ==="
          dpkg -l libqt5xcbqpa-dev 2>/dev/null | tail -2 || echo "libqt5xcbqpa-dev not installed"
          echo "=== Qt5 XCB private headers search ==="
          find /usr/include -name "qxcbcursor_p.h" -o -name "qxcbintegration_p.h" 2>/dev/null | head -5 || true
          echo "=== Qt5Core_INCLUDE_DIRS candidate ==="
          pkg-config --variable=includedir Qt5Core 2>/dev/null || true
          echo "=== Qt5 XCB header versioned dirs ==="
          find /usr/include -path "*/QtXcb/*" -type d 2>/dev/null | head -10 || true

      - name: Test cmake configure
        run: |
          mkdir -p /tmp/test_build5
          QT_SELECT=qt5 cmake -S . -B /tmp/test_build5 -DBUILD_TESTING=OFF -DDTK5=ON 2>&1 | tee /tmp/cmake_configure.log || true
          echo "=== cmake configure result: $? ==="
          grep -i "error:\|FATAL_ERROR\|Not support\|Qt.*version\|Qt5_VERSION\|Qt5Core_INCLUDE_DIRS" /tmp/cmake_configure.log | head -20 || true

      - name: Build qt5platform-plugins deb packages
        run: |
          dpkg-buildpackage -uc -us -b 2>&1 | tee /tmp/build.log; BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed! Last 200 lines of build log:"
            grep -n "error:\|Error:\|FAILED\|fatal error" /tmp/build.log | head -30 || true
            echo "--- Last 300 lines ---"
            tail -300 /tmp/build.log
            exit $BUILD_STATUS
          fi
          echo "✅ qt5platform-plugins deb packages built successfully!"
          ls -la ../

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qt5platform-plugins-deepin-build-log
          path: /tmp/build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Collect deb artifacts
        run: |
          mkdir -p dist
          mv ../*.deb dist/
          ls -la dist

      - name: Upload qt5platform-plugins deb packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt5platform-plugins-deepin-deb-packages
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 30
